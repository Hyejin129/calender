<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f5f7;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    color: #1a1a2e;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e8eaed;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -0.3px;
  }
  .logo span { color: #4f46e5; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
  }
  .btn-ghost {
    background: #fff;
    color: #6b7280;
    border: 1px solid #e5e7eb;
  }
  .btn-ghost:hover { border-color: #4f46e5; color: #4f46e5; background: #f5f3ff; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── CAL NAV ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-title {
    font-size: 32px;
    font-weight: 900;
    color: #1a1a2e;
    letter-spacing: -0.5px;
  }
  .cal-title span { color: #4f46e5; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid #e5e7eb;
    color: #374151;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .today-btn {
    width: auto;
    padding: 0 14px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
  }

  /* ── CALENDAR ── */
  .cal-wrap {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8eaed;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day-header {
    padding: 14px 0;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #9ca3af;
    border-bottom: 1px solid #f0f0f5;
    background: #fafafa;
  }
  .day-header.sun { color: #ef4444; }
  .day-header.sat { color: #6366f1; }

  .day-cell {
    border-right: 1px solid #f0f0f5;
    border-bottom: 1px solid #f0f0f5;
    min-height: 130px;
    padding: 10px;
    cursor: pointer;
    transition: background .12s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f8f7ff; }
  .day-cell.other-month { background: #fafafa; }
  .day-cell.other-month .day-num { color: #d1d5db; }

  .day-num {
    font-size: 16px;
    font-weight: 700;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    color: #374151;
  }
  .day-num.sun { color: #ef4444; }
  .day-num.sat { color: #6366f1; }
  .day-cell.today .day-num {
    background: #4f46e5;
    color: #fff !important;
  }

  .holiday-tag {
    font-size: 12px;
    font-weight: 600;
    color: #ef4444;
    background: #fef2f2;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .memo-chip {
    font-size: 13px;
    color: #4f46e5;
    background: #eef2ff;
    padding: 3px 7px;
    border-radius: 5px;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-all;
  }

  /* 출근일 - 초록 배경 */
  .day-cell.workday {
    background: #f0fdf4 !important;
    border-color: #bbf7d0 !important;
  }
  .day-cell.workday:hover { background: #dcfce7 !important; }
  .day-cell.workday .memo-chip {
    color: #15803d;
    background: #dcfce7;
  }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,30,.45);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    border-radius: 18px;
    width: 440px;
    max-width: 95vw;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    transform: translateY(10px) scale(.98);
    transition: transform .2s;
  }
  .overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .modal-date { font-size: 22px; font-weight: 900; color: #1a1a2e; }
  .modal-holiday { font-size: 15px; color: #ef4444; font-weight: 600; margin-top: 3px; }
  .close-btn {
    width: 30px; height: 30px;
    background: #f3f4f6; border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    color: #6b7280;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
  }
  .close-btn:hover { background: #e5e7eb; color: #374151; }

  .divider { height: 1px; background: #f0f0f5; margin: 16px 0; }

  .modal label {
    display: block;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .note-input {
    width: 100%;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    color: #1a1a2e;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    min-height: 100px;
    transition: border-color .15s;
    line-height: 1.6;
  }
  .note-input:focus { outline: none; border-color: #4f46e5; background: #fff; }
  .note-input::placeholder { color: #c4c9d4; }

  .modal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
  }
  .delete-btn {
    background: transparent;
    border: none;
    color: #ef4444;
    font-size: 15px;
    opacity: .7;
  }
  .delete-btn:hover { opacity: 1; }
  .modal-btns { display: flex; gap: 8px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: #1a1a2e;
    color: #fff;
    padding: 11px 22px;
    border-radius: 40px;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: all .25s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 16px 10px; }
    .cal-title { font-size: 20px; }
    .day-cell { min-height: 70px; padding: 5px; }
    .day-num { width: 22px; height: 22px; font-size: 11px; }
    .memo-chip { font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DOWNTOP <span>CALENDAR</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportData()">📤 내보내기</button>
    <button class="btn btn-ghost" onclick="importData()">📥 불러오기</button>
    <input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">
  </div>
</header>

<main>
  <div class="cal-nav">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn today-btn" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>
  <div class="cal-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</main>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-holiday" id="modal-holiday"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="divider"></div>
    <label>메모</label>
    <textarea class="note-input" id="modal-note" placeholder="이 날의 메모를 입력하세요...&#10;(Ctrl+Enter 로 빠르게 저장)"></textarea>
    <div class="modal-footer">
      <button class="delete-btn" id="delete-btn" onclick="deleteNote()">🗑 메모 삭제</button>
      <div class="modal-btns">
        <button class="btn btn-ghost" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveNote()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let notes = {};
let currentDate = new Date();
let selectedKey = null;

function getHolidays(year) {
  const h = {
    [`${year}-01-01`]: '신정',
    [`${year}-03-01`]: '삼일절',
    [`${year}-05-05`]: '어린이날',
    [`${year}-06-06`]: '현충일',
    [`${year}-08-15`]: '광복절',
    [`${year}-10-03`]: '개천절',
    [`${year}-10-09`]: '한글날',
    [`${year}-12-25`]: '크리스마스',
  };
  const seollal = {
    2024: [['2024-02-09','설날 전날'],['2024-02-10','설날'],['2024-02-11','설날 다음날'],['2024-02-12','대체공휴일']],
    2025: [['2025-01-28','설날 전날'],['2025-01-29','설날'],['2025-01-30','설날 다음날'],['2025-01-31','대체공휴일']],
    2026: [['2026-02-16','설날 전날'],['2026-02-17','설날'],['2026-02-18','설날 다음날'],['2026-02-19','대체공휴일']],
    2027: [['2027-02-06','설날 전날'],['2027-02-07','설날'],['2027-02-08','설날 다음날'],['2027-02-09','대체공휴일']],
  };
  const chuseok = {
    2024: [['2024-09-16','추석 전날'],['2024-09-17','추석'],['2024-09-18','추석 다음날'],['2024-09-19','대체공휴일']],
    2025: [['2025-10-05','추석 전날'],['2025-10-06','추석'],['2025-10-07','추석 다음날'],['2025-10-08','대체공휴일']],
    2026: [['2026-09-24','추석 전날'],['2026-09-25','추석'],['2026-09-26','추석 다음날'],['2026-09-27','대체공휴일']],
    2027: [['2027-10-14','추석 전날'],['2027-10-15','추석'],['2027-10-16','추석 다음날'],['2027-10-17','대체공휴일']],
  };
  const buddha  = { 2024:'2024-05-15', 2025:'2025-05-05', 2026:'2026-05-24', 2027:'2027-05-13' };
  const election = { 2026:'2026-06-03' };

  if (seollal[year])  seollal[year].forEach(([d,n])  => h[d]=n);
  if (chuseok[year])  chuseok[year].forEach(([d,n])  => h[d]=n);
  if (buddha[year])   h[buddha[year]]   = '부처님오신날';
  if (election[year]) h[election[year]] = '지방선거일';
  return h;
}

function render() {
  const y  = currentDate.getFullYear();
  const mo = currentDate.getMonth();
  const holidays = getHolidays(y);
  const moNames  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  document.getElementById('cal-title').innerHTML = `${y}년 <span>${moNames[mo]}</span>`;

  const dayLabels  = ['일','월','화','수','목','금','토'];
  const dayClasses = ['sun','','','','','','sat'];
  let html = dayLabels.map((d,i) => `<div class="day-header ${dayClasses[i]}">${d}</div>`).join('');

  const first    = new Date(y, mo, 1);
  const last     = new Date(y, mo+1, 0);
  const startDay = first.getDay();
  const today    = new Date();

  const addCell = (date, other) => {
    const key     = dateKey(date);
    const dow     = date.getDay();
    const isToday = sameDay(date, today);
    const holiday = holidays[key];
    const note    = notes[key] || '';
    const numCls  = (dow===0 || holiday) ? 'sun' : dow===6 ? 'sat' : '';
    const isWorkday = note.includes('출근');

    html += `<div class="day-cell${other?' other-month':''}${isToday?' today':''}${isWorkday?' workday':''}" onclick="openModal('${key}')">
      <div class="day-num ${numCls}">${date.getDate()}</div>
      ${holiday ? `<div class="holiday-tag">${holiday}</div>` : ''}
      ${note    ? `<div class="memo-chip">${escHtml(note)}</div>` : ''}
    </div>`;
  };

  for (let i=0; i<startDay; i++)         addCell(new Date(y, mo,   i-startDay+1), true);
  for (let d=1; d<=last.getDate(); d++)   addCell(new Date(y, mo,   d),            false);
  const rem = 42-(startDay+last.getDate());
  for (let d=1; d<=rem; d++)              addCell(new Date(y, mo+1, d),            true);

  document.getElementById('cal-grid').innerHTML = html;
}

function openModal(key) {
  selectedKey = key;
  const [y,mo,d] = key.split('-').map(Number);
  const date     = new Date(y, mo-1, d);
  const holidays = getHolidays(y);
  const holiday  = holidays[key];
  const moNames  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['일','월','화','수','목','금','토'];

  document.getElementById('modal-date').textContent    = `${y}년 ${moNames[mo-1]} ${d}일 (${dayNames[date.getDay()]})`;
  document.getElementById('modal-holiday').textContent = holiday ? `🎌 ${holiday}` : '';
  document.getElementById('modal-note').value          = notes[key] || '';
  document.getElementById('delete-btn').style.visibility = notes[key] ? 'visible' : 'hidden';

  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-note').focus(), 150);
}

async function saveNote() {
  const val = document.getElementById('modal-note').value.trim();
  if (val) notes[selectedKey] = val;
  else     delete notes[selectedKey];
  save(); render(); closeModal();
  showToast('💾 저장 중...');
  await syncToSheet(selectedKey, val);
  showToast('✅ 저장되었습니다');
}

async function deleteNote() {
  if (!confirm('메모를 삭제할까요?')) return;
  delete notes[selectedKey];
  save(); render(); closeModal();
  showToast('💾 삭제 중...');
  await syncToSheet(selectedKey, '');
  showToast('🗑 메모를 삭제했습니다');
}

function closeModal()       { document.getElementById('overlay').classList.remove('open'); }
function onOverlayClick(e)  { if (e.target===document.getElementById('overlay')) closeModal(); }

document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter' && document.getElementById('overlay').classList.contains('open')) saveNote();
});

function changeMonth(dir) { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1); render(); }
function goToday()        { currentDate = new Date(); render(); }

const API_URL = 'https://script.google.com/macros/s/AKfycbwj-jr31Y3KpJPDNekUjUOAmV3eiJ5O-umAUfUfXmlHJOjrvviscUVem8j82anpOkqm/exec';

function save() {
  try { localStorage.setItem('cal-notes', JSON.stringify(notes)); } catch(e){}
}

async function syncToSheet(date, note) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date, note })
    });
  } catch(e) { console.warn('Sheets 동기화 실패:', e); }
}

async function load() {
  try { const d=localStorage.getItem('cal-notes'); if(d) notes=JSON.parse(d); } catch(e){}
  render();
  try {
    showToast('🔄 데이터 불러오는 중...');
    const res = await fetch(API_URL + '?t=' + Date.now());
    const data = await res.json();
    notes = data;
    save();
    render();
    showToast('✅ 최신 데이터 불러옴');
  } catch(e) {
    showToast('⚠️ 오프라인 - 로컬 데이터 사용 중');
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify({notes}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `calendar-notes-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📤 내보내기 완료');
}
function importData() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      notes = data.notes || data;
      save(); render();
      showToast('📥 불러오기 완료');
    } catch { showToast('❌ 파일 형식 오류'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
</body>
</html>
