<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다운탑 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f5f7;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    color: #1a1a2e;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e8eaed;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -0.3px;
  }
  .logo span { color: #4f46e5; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
  }
  .btn-ghost {
    background: #fff;
    color: #6b7280;
    border: 1px solid #e5e7eb;
  }
  .btn-ghost:hover { border-color: #4f46e5; color: #4f46e5; background: #f5f3ff; }
  .btn-primary { background: #4f46e5; color: #fff; }
  .btn-primary:hover { background: #4338ca; }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── CAL NAV ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-title {
    font-size: 32px;
    font-weight: 900;
    color: #1a1a2e;
    letter-spacing: -0.5px;
  }
  .cal-title span { color: #4f46e5; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid #e5e7eb;
    color: #374151;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  .nav-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .today-btn {
    width: auto;
    padding: 0 14px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 600;
  }

  /* ── CALENDAR ── */
  .cal-wrap {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8eaed;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day-header {
    padding: 14px 0;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #9ca3af;
    border-bottom: 1px solid #f0f0f5;
    background: #fafafa;
  }
  .day-header.sun { color: #ef4444; }
  .day-header.sat { color: #6366f1; }

  .day-cell {
    border-right: 1px solid #f0f0f5;
    border-bottom: 1px solid #f0f0f5;
    min-height: 130px;
    padding: 10px;
    cursor: pointer;
    transition: background .12s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f8f7ff; }
  .day-cell.other-month { background: #fafafa; }
  .day-cell.other-month .day-num { color: #d1d5db; }

  .day-num {
    font-size: 16px;
    font-weight: 700;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    color: #374151;
  }
  .day-num.sun { color: #ef4444; }
  .day-num.sat { color: #6366f1; }
  .day-cell.today .day-num {
    background: #4f46e5;
    color: #fff !important;
  }

  /* 선택된 날짜 */
  .day-cell.selected {
    background: #eef2ff !important;
    border-color: #c7d2fe !important;
  }
  .day-cell.selected .day-num {
    outline: 2px solid #4f46e5;
    outline-offset: 2px;
  }
  .day-cell.today.selected .day-num {
    outline: none;
  }

  .holiday-tag {
    font-size: 12px;
    font-weight: 600;
    color: #ef4444;
    background: #fef2f2;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .memo-chip {
    font-size: 13px;
    color: #4f46e5;
    background: #eef2ff;
    padding: 3px 7px;
    border-radius: 5px;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-all;
  }

  /* 출근일 - 초록 배경 */
  .day-cell.workday {
    background: #f0fdf4 !important;
    border-color: #bbf7d0 !important;
  }
  .day-cell.workday:hover { background: #dcfce7 !important; }
  .day-cell.workday .memo-chip {
    color: #15803d;
    background: #dcfce7;
  }
  .day-cell.workday.selected {
    background: #dcfce7 !important;
  }

  /* ── INLINE MEMO PANEL ── */
  .memo-panel-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .memo-panel-wrap.open {
    max-height: 420px;
  }

  .memo-panel {
    background: #fff;
    border-radius: 0 0 16px 16px;
    border: 1px solid #e8eaed;
    border-top: none;
    box-shadow: 0 6px 16px rgba(0,0,0,.07);
    padding: 24px 28px 22px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .memo-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .memo-panel-date {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .memo-panel-date-text {
    font-size: 18px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -0.3px;
  }

  .memo-panel-holiday {
    font-size: 13px;
    font-weight: 600;
    color: #ef4444;
    background: #fef2f2;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .memo-panel-close {
    width: 28px; height: 28px;
    background: #f3f4f6;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    color: #6b7280;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s;
    flex-shrink: 0;
  }
  .memo-panel-close:hover { background: #e5e7eb; color: #374151; }

  .memo-panel-body {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .memo-textarea {
    flex: 1;
    background: #f9fafb;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    color: #1a1a2e;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    resize: vertical;
    min-height: 110px;
    max-height: 240px;
    line-height: 1.7;
    transition: border-color .15s, box-shadow .15s;
  }
  .memo-textarea:focus {
    outline: none;
    border-color: #4f46e5;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.08);
  }
  .memo-textarea::placeholder { color: #c4c9d4; }

  .memo-panel-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .memo-save-btn {
    padding: 9px 18px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .memo-save-btn:hover { background: #4338ca; }

  .memo-delete-btn {
    padding: 8px 18px;
    background: transparent;
    color: #9ca3af;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .memo-delete-btn:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }

  .memo-hint {
    font-size: 12px;
    color: #d1d5db;
    text-align: center;
  }

  /* 저장 상태 표시 */
  .save-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #9ca3af;
    min-height: 20px;
    transition: color .2s;
  }
  .save-status.saving { color: #f59e0b; }
  .save-status.saved  { color: #10b981; }
  .save-status.error  { color: #ef4444; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: #1a1a2e;
    color: #fff;
    padding: 11px 22px;
    border-radius: 40px;
    font-size: 15px;
    opacity: 0;
    pointer-events: none;
    transition: all .25s;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 16px 10px; }
    .cal-title { font-size: 20px; }
    .day-cell { min-height: 70px; padding: 5px; }
    .day-num { width: 22px; height: 22px; font-size: 11px; }
    .memo-chip { font-size: 10px; }
    .memo-panel { padding: 16px; }
    .memo-panel-body { flex-direction: column; }
    .memo-panel-actions { flex-direction: row; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DOWNTOP <span>CALENDAR</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportData()">📤 내보내기</button>
    <button class="btn btn-ghost" onclick="importData()">📥 불러오기</button>
    <input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">
  </div>
</header>

<main>
  <div class="cal-nav">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn today-btn" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- 인라인 메모 패널 -->
  <div class="memo-panel-wrap" id="memo-panel-wrap">
    <div class="memo-panel">
      <div class="memo-panel-header">
        <div class="memo-panel-date">
          <div class="memo-panel-date-text" id="panel-date-text"></div>
          <div class="memo-panel-holiday" id="panel-holiday" style="display:none"></div>
        </div>
        <button class="memo-panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="memo-panel-body">
        <textarea
          class="memo-textarea"
          id="panel-note"
          placeholder="회의 내용을 입력하세요...&#10;&#10;"
        ></textarea>
        <div class="memo-panel-actions">
          <button class="memo-save-btn" onclick="savePanel()">💾 저장</button>
          <button class="memo-delete-btn" id="panel-delete-btn" onclick="deletePanel()">🗑 삭제</button>
          <div class="memo-hint">Ctrl+Enter</div>
        </div>
      </div>
      <div class="save-status" id="save-status"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let notes = {};
let currentDate = new Date();
let selectedKey = null;

function getHolidays(year) {
  const h = {
    [`${year}-01-01`]: '신정',
    [`${year}-03-01`]: '삼일절',
    [`${year}-05-05`]: '어린이날',
    [`${year}-06-06`]: '현충일',
    [`${year}-08-15`]: '광복절',
    [`${year}-10-03`]: '개천절',
    [`${year}-10-09`]: '한글날',
    [`${year}-12-25`]: '크리스마스',
  };
  const seollal = {
    2024: [['2024-02-09','설날 전날'],['2024-02-10','설날'],['2024-02-11','설날 다음날'],['2024-02-12','대체공휴일']],
    2025: [['2025-01-28','설날 전날'],['2025-01-29','설날'],['2025-01-30','설날 다음날'],['2025-01-31','대체공휴일']],
    2026: [['2026-02-16','설날 전날'],['2026-02-17','설날'],['2026-02-18','설날 다음날'],['2026-02-19','대체공휴일']],
    2027: [['2027-02-06','설날 전날'],['2027-02-07','설날'],['2027-02-08','설날 다음날'],['2027-02-09','대체공휴일']],
  };
  const chuseok = {
    2024: [['2024-09-16','추석 전날'],['2024-09-17','추석'],['2024-09-18','추석 다음날'],['2024-09-19','대체공휴일']],
    2025: [['2025-10-05','추석 전날'],['2025-10-06','추석'],['2025-10-07','추석 다음날'],['2025-10-08','대체공휴일']],
    2026: [['2026-09-24','추석 전날'],['2026-09-25','추석'],['2026-09-26','추석 다음날'],['2026-09-27','대체공휴일']],
    2027: [['2027-10-14','추석 전날'],['2027-10-15','추석'],['2027-10-16','추석 다음날'],['2027-10-17','대체공휴일']],
  };
  const buddha  = { 2024:'2024-05-15', 2025:'2025-05-05', 2026:'2026-05-24', 2027:'2027-05-13' };
  const election = { 2026:'2026-06-03' };

  if (seollal[year])  seollal[year].forEach(([d,n])  => h[d]=n);
  if (chuseok[year])  chuseok[year].forEach(([d,n])  => h[d]=n);
  if (buddha[year])   h[buddha[year]]   = '부처님오신날';
  if (election[year]) h[election[year]] = '지방선거일';
  return h;
}

function render() {
  const y  = currentDate.getFullYear();
  const mo = currentDate.getMonth();
  const holidays = getHolidays(y);
  const moNames  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  document.getElementById('cal-title').innerHTML = `${y}년 <span>${moNames[mo]}</span>`;

  const dayLabels  = ['일','월','화','수','목','금','토'];
  const dayClasses = ['sun','','','','','','sat'];
  let html = dayLabels.map((d,i) => `<div class="day-header ${dayClasses[i]}">${d}</div>`).join('');

  const first    = new Date(y, mo, 1);
  const last     = new Date(y, mo+1, 0);
  const startDay = first.getDay();
  const today    = new Date();

  const addCell = (date, other) => {
    const key     = dateKey(date);
    const dow     = date.getDay();
    const isToday = sameDay(date, today);
    const holiday = holidays[key];
    const note    = notes[key] || '';
    const numCls  = (dow===0 || holiday) ? 'sun' : dow===6 ? 'sat' : '';
    const isWorkday  = note.includes('출근');
    const isSelected = key === selectedKey;

    html += `<div class="day-cell${other?' other-month':''}${isToday?' today':''}${isWorkday?' workday':''}${isSelected?' selected':''}" onclick="selectDay('${key}')">
      <div class="day-num ${numCls}">${date.getDate()}</div>
      ${holiday ? `<div class="holiday-tag">${holiday}</div>` : ''}
      ${note    ? `<div class="memo-chip">${escHtml(note)}</div>` : ''}
    </div>`;
  };

  for (let i=0; i<startDay; i++)         addCell(new Date(y, mo,   i-startDay+1), true);
  for (let d=1; d<=last.getDate(); d++)   addCell(new Date(y, mo,   d),            false);
  const rem = 42-(startDay+last.getDate());
  for (let d=1; d<=rem; d++)              addCell(new Date(y, mo+1, d),            true);

  document.getElementById('cal-grid').innerHTML = html;
}

/* ── 인라인 메모 패널 ── */
function selectDay(key) {
  // 같은 날 다시 클릭하면 패널 닫기
  if (selectedKey === key && document.getElementById('memo-panel-wrap').classList.contains('open')) {
    closePanel();
    return;
  }

  selectedKey = key;
  const [y, mo, d] = key.split('-').map(Number);
  const date = new Date(y, mo - 1, d);
  const holidays = getHolidays(y);
  const holiday = holidays[key];
  const moNames  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['일','월','화','수','목','금','토'];

  document.getElementById('panel-date-text').textContent =
    `${y}년 ${moNames[mo-1]} ${d}일 (${dayNames[date.getDay()]})`;

  const holidayEl = document.getElementById('panel-holiday');
  if (holiday) {
    holidayEl.textContent = `🎌 ${holiday}`;
    holidayEl.style.display = 'block';
  } else {
    holidayEl.style.display = 'none';
  }

  document.getElementById('panel-note').value = notes[key] || '';
  document.getElementById('panel-delete-btn').style.visibility = notes[key] ? 'visible' : 'hidden';
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = 'save-status';

  // 패널 열기
  document.getElementById('memo-panel-wrap').classList.add('open');

  // 달력 셀 선택 표시 갱신
  render();

  // 포커스
  setTimeout(() => document.getElementById('panel-note').focus(), 300);

  // 패널로 스크롤
  setTimeout(() => {
    document.getElementById('memo-panel-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function closePanel() {
  selectedKey = null;
  document.getElementById('memo-panel-wrap').classList.remove('open');
  render();
}

function setSaveStatus(type, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + type;
  el.textContent = msg;
}

async function savePanel() {
  const val = document.getElementById('panel-note').value.trim();
  if (val) notes[selectedKey] = val;
  else     delete notes[selectedKey];

  // 삭제 버튼 가시성
  document.getElementById('panel-delete-btn').style.visibility = val ? 'visible' : 'hidden';

  save();
  render();

  setSaveStatus('saving', '💾 저장 중...');
  try {
    await syncToSheet(selectedKey, val);
    setSaveStatus('saved', '✅ 저장되었습니다');
  } catch(e) {
    setSaveStatus('error', '⚠️ 로컬에만 저장됨');
  }
  setTimeout(() => {
    setSaveStatus('', '');
  }, 3000);
}

async function deletePanel() {
  if (!confirm('메모를 삭제할까요?')) return;
  delete notes[selectedKey];
  document.getElementById('panel-note').value = '';
  document.getElementById('panel-delete-btn').style.visibility = 'hidden';

  save();
  render();

  setSaveStatus('saving', '💾 삭제 중...');
  try {
    await syncToSheet(selectedKey, '');
    setSaveStatus('saved', '🗑 삭제되었습니다');
  } catch(e) {
    setSaveStatus('error', '⚠️ 로컬에만 반영됨');
  }
  setTimeout(() => setSaveStatus('', ''), 3000);
}

/* ── 키보드 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if (document.getElementById('memo-panel-wrap').classList.contains('open')) {
      savePanel();
    }
  }
});

function changeMonth(dir) {
  // 월 변경 시 패널 닫기
  closePanel();
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1);
  render();
}
function goToday() {
  closePanel();
  currentDate = new Date();
  render();
}

/* ── Google Sheets 연동 ── */
const API_URL = 'https://script.google.com/macros/s/AKfycbwhwf6HTEV826uLz274egF1UD2m_1Yezm_3KsqULfmOCxQ7samoSBtw0P1bcM5F0WyU/exec';

function save() {
  try { localStorage.setItem('cal-notes', JSON.stringify(notes)); } catch(e){}
}

async function syncToSheet(date, note) {
  const res = await fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, note })
  });
  return res;
}

async function load() {
  try { const d=localStorage.getItem('cal-notes'); if(d) notes=JSON.parse(d); } catch(e){}
  render();
  try {
    showToast('🔄 데이터 불러오는 중...');
    const res = await fetch(API_URL + '?t=' + Date.now());
    const raw = await res.json();
    const parsed = {};
    if (typeof raw === 'object' && !Array.isArray(raw)) {
      Object.entries(raw).forEach(([k, v]) => {
        const key = String(k).trim();
        const val = String(v).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(key) && val) parsed[key] = val;
      });
    }
    notes = parsed;
    save();
    render();
    showToast('✅ 최신 데이터 불러옴');
  } catch(e) {
    console.warn('Sheets 로드 실패:', e);
    showToast('⚠️ 오프라인 - 로컬 데이터 사용 중');
  }
}

function exportData() {
  const blob = new Blob([JSON.stringify({notes}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `calendar-notes-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('📤 내보내기 완료');
}
function importData() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      notes = data.notes || data;
      save(); render();
      showToast('📥 불러오기 완료');
    } catch { showToast('❌ 파일 형식 오류'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

load();
</script>
