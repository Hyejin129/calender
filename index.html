<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다운탑 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f5f7;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    color: #1a1a2e;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e8eaed;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .logo { font-size: 22px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.3px; }
  .logo span { color: #4f46e5; }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; }
  .btn-ghost { background: #fff; color: #6b7280; border: 1px solid #e5e7eb; }

  /* ── MAIN ── */
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* ── CAL NAV ── */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cal-title { font-size: 32px; font-weight: 900; color: #1a1a2e; letter-spacing: -0.5px; }
  .cal-title span { color: #4f46e5; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn { width: 36px; height: 36px; border-radius: 8px; background: #fff; border: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .today-btn { width: auto; padding: 0 14px; font-weight: 600; }

  /* ── CALENDAR ── */
  .cal-wrap { background: #fff; border-radius: 16px; border: 1px solid #e8eaed; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-header { padding: 14px 0; text-align: center; font-size: 15px; font-weight: 700; color: #9ca3af; background: #fafafa; border-bottom: 1px solid #f0f0f5; }
  .day-header.sun { color: #ef4444; }
  .day-header.sat { color: #6366f1; }

  .day-cell { border-right: 1px solid #f0f0f5; border-bottom: 1px solid #f0f0f5; min-height: 140px; padding: 10px; cursor: pointer; transition: background .12s; display: flex; flex-direction: column; gap: 4px; }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f8f7ff; }
  .day-cell.other-month { background: #fafafa; opacity: 0.5; }

  .day-num { font-size: 16px; font-weight: 700; width: 32px; height: 32px; /* 동그라미 크기 */ display: flex; align-items: center; justify-content: center; border-radius: 50%; /* 완전한 원형 */ transition: all 0.2s; margin-bottom: 2px;}
  .day-num.sun { color: #ef4444 !important; } /* 일요일/공휴일 빨간색 */
  .day-num.sat { color: #6366f1; }
  .day-cell.today .day-num { background: #4f46e5 !important; color: #fff !important; box-shadow: 0 2px 6px rgba(79, 70, 229, 0.4); }
  .day-cell.selected:not(.today) .day-num { outline: 2px solid #4f46e5; outline-offset: 2px; }

  /* Tags */
  .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-holiday { background: #fee2e2; color: #ef4444; } /* 공휴일 태그 빨간색 */
  .tag-work { background: #f0fdf4; color: #15803d; }
  .tag-off { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; } /* 연차 파란색 */
  .tag-half { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; } /* 반차 파란색 */
  .tag-meeting { background: #f3f4f6; color: #4b5563; margin-top: 2px; border-left: 3px solid #4f46e5; }

  /* ── MEMO PANEL ── */
  .memo-panel-wrap { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
  .memo-panel-wrap.open { max-height: 800px; margin-top: 20px; }
  .memo-panel { background: #fff; border-radius: 16px; border: 1px solid #4f46e5; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1); }
  .panel-section { display: flex; flex-direction: column; gap: 10px; }
  .section-title { font-size: 14px; font-weight: 700; color: #6b7280; }
  .attendance-grid { display: flex; gap: 10px; }
  .att-option { flex: 1; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; text-align: center; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  .att-option.active { border-color: #4f46e5; background: #f5f3ff; color: #4f46e5; font-weight: 700; }
  .name-input { width: 100%; padding: 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; margin-top: 5px; }
  .memo-textarea { width: 100%; min-height: 100px; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; resize: vertical; }
  .save-status { font-size: 13px; color: #9ca3af; height: 20px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">DOWNTOP <span>TEAM</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportData()">📤 백업</button>
  </div>
</header>

<main>
  <div class="cal-nav">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn today-btn" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="memo-panel-wrap" id="memo-panel-wrap">
    <div class="memo-panel">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h2 id="panel-date-text">날짜</h2>
        <button class="nav-btn" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-section">
        <div class="section-title">출근/휴무 상태</div>
        <div class="attendance-grid">
          <div class="att-option" data-val="work" onclick="setAtt('work')">출근</div>
          <div class="att-option" data-val="off" onclick="setAtt('off')">연차</div>
          <div class="att-option" data-val="half" onclick="setAtt('half')">반차</div>
        </div>
        <div id="name-input-box" style="display:none">
          <input type="text" id="att-names" class="name-input" placeholder="대상자 이름을 입력하세요">
        </div>
      </div>
      <div class="panel-section">
        <div class="section-title">회의 및 주요 일정 메모</div>
        <textarea id="meeting-note" class="memo-textarea" placeholder="회의 내용 입력..."></textarea>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="save-status" id="save-status"></div>
        <button class="btn" style="background:#4f46e5; color:#fff; padding:10px 24px" onclick="saveData()">💾 데이터 저장하기</button>
      </div>
    </div>
  </div>
</main>

<script>
let calendarData = {};
let currentDate = new Date();
let selectedKey = null;

const API_URL = 'https://script.google.com/macros/s/AKfycbwXxHQO6rneZDw_0sCrc_dxrM-dVWXHtKQS1w7lqEr3o13fZLKEzBdiFOOikQJY3_HN/exec';

// 공휴일 계산기 (기존 로직 복구)
function getHolidays(year) {
  const h = {
    [`${year}-01-01`]: '신정', [`${year}-03-01`]: '삼일절', [`${year}-05-05`]: '어린이날',
    [`${year}-06-06`]: '현충일', [`${year}-08-15`]: '광복절', [`${year}-10-03`]: '개천절',
    [`${year}-10-09`]: '한글날', [`${year}-12-25`]: '크리스마스',
  };
  const seollal = {
    2024: [['2024-02-09','설날'],['2024-02-10','설날'],['2024-02-11','설날'],['2024-02-12','대체공휴일']],
    2025: [['2025-01-28','설날'],['2025-01-29','설날'],['2025-01-30','설날'],['2025-01-31','대체공휴일']],
    2026: [['2026-02-16','설날'],['2026-02-17','설날'],['2026-02-18','설날'],['2026-02-19','대체공휴일']],
  };
  const chuseok = {
    2024: [['2024-09-16','추석'],['2024-09-17','추석'],['2024-09-18','추석'],['2024-09-19','대체공휴일']],
    2025: [['2025-10-05','추석'],['2025-10-06','추석'],['2025-10-07','추석'],['2025-10-08','대체공휴일']],
    2026: [['2026-09-24','추석'],['2026-09-25','추석'],['2026-09-26','추석'],['2026-09-27','대체공휴일']],
  };
  const extra = { 2024: {'2024-05-15':'부처님오신날'}, 2025: {'2025-05-05':'부처님오신날'}, 2026: {'2026-05-24':'부처님오신날'} };
  if (seollal[year]) seollal[year].forEach(([d,n]) => h[d]=n);
  if (chuseok[year]) chuseok[year].forEach(([d,n]) => h[d]=n);
  if (extra[year]) Object.assign(h, extra[year]);
  return h;
}

async function init() {
  await loadData();
  render();
}

function render() {
  const y = currentDate.getFullYear();
  const mo = currentDate.getMonth();
  const holidays = getHolidays(y);
  
  document.getElementById('cal-title').innerHTML = `${y}년 <span>${mo + 1}월</span>`;

  let html = ['일','월','화','수','목','금','토'].map((d,i) => 
    `<div class="day-header ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  const first = new Date(y, mo, 1);
  const last = new Date(y, mo+1, 0);
  const startDay = first.getDay();

  const addCell = (date, isOther) => {
    const key = dateKey(date);
    const dayData = calendarData[key] || {};
    const holidayName = holidays[key];
    const isSun = date.getDay() === 0 || holidayName;
    const isSat = date.getDay() === 6;
    const isSelected = key === selectedKey;
    const isToday = sameDay(date, new Date()); // 오늘 날짜 체크
    
    let tagsHtml = '';
    if(holidayName) tagsHtml += `<div class="tag tag-holiday">${holidayName}</div>`;
    if(dayData.type === 'work') tagsHtml += `<div class="tag tag-work">출근</div>`;
    if(dayData.type === 'off') tagsHtml += `<div class="tag tag-off">연차: ${dayData.names || ''}</div>`;
    if(dayData.type === 'half') tagsHtml += `<div class="tag tag-half">반차: ${dayData.names || ''}</div>`;
    if(dayData.note) tagsHtml += `<div class="tag tag-meeting">📝 메모</div>`;

    // day-cell에 today 클래스 추가
    html += `
      <div class="day-cell ${isOther?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDay('${key}')">
        <div class="day-num ${isSun?'sun':isSat?'sat':''}">${date.getDate()}</div>
        ${tagsHtml}
      </div>`;
  };

  for (let i=0; i<startDay; i++) addCell(new Date(y, mo, i-startDay+1), true);
  for (let d=1; d<=last.getDate(); d++) addCell(new Date(y, mo, d), false);
  for (let d=1; d<=(42-(startDay+last.getDate())); d++) addCell(new Date(y, mo+1, d), true);

  document.getElementById('cal-grid').innerHTML = html;
}

function selectDay(key) {
  selectedKey = key;
  const data = calendarData[key] || { type: '', names: '', note: '' };
  document.getElementById('panel-date-text').textContent = key;
  document.getElementById('meeting-note').value = data.note || '';
  document.getElementById('att-names').value = data.names || '';
  document.querySelectorAll('.att-option').forEach(opt => opt.classList.toggle('active', opt.dataset.val === data.type));
  toggleNameInput(data.type);
  document.getElementById('memo-panel-wrap').classList.add('open');
  render();
}

function setAtt(type) {
  const active = document.querySelector('.att-option.active');
  const newType = (active && active.dataset.val === type) ? '' : type;
  document.querySelectorAll('.att-option').forEach(opt => opt.classList.toggle('active', opt.dataset.val === newType));
  toggleNameInput(newType);
}

function toggleNameInput(type) {
  document.getElementById('name-input-box').style.display = (type === 'off' || type === 'half') ? 'block' : 'none';
}

async function saveData() {
  const active = document.querySelector('.att-option.active');
  const type = active ? active.dataset.val : '';
  const names = document.getElementById('att-names').value;
  const note = document.getElementById('meeting-note').value;
  calendarData[selectedKey] = { type, names, note };
  
  setSaveStatus('💾 저장 중...');
  try {
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ date: selectedKey, type, names, note }) });
    localStorage.setItem('downtop-data', JSON.stringify(calendarData));
    setSaveStatus('✅ 저장 완료');
    render();
  } catch (e) { setSaveStatus('❌ 오류 발생'); }
}

async function loadData() {
  const local = localStorage.getItem('downtop-data');
  if(local) calendarData = JSON.parse(local);
  try {
    const res = await fetch(API_URL);
    const remote = await res.json();
    if(remote) { calendarData = remote; localStorage.setItem('downtop-data', JSON.stringify(calendarData)); }
  } catch(e) {}
}

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function changeMonth(dir) { currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1); render(); }
function goToday() { currentDate = new Date(); render(); }
function setSaveStatus(msg) { document.getElementById('save-status').textContent = msg; }
function closePanel() { document.getElementById('memo-panel-wrap').classList.remove('open'); selectedKey = null; render(); }

init();
</script>
</body>
</html>
