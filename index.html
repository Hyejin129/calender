<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다운탑 팀 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f5f7;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    color: #1a1a2e;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 1px solid #e8eaed;
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    color: #1a1a2e;
    letter-spacing: -0.3px;
  }
  .logo span { color: #4f46e5; }
  .header-actions { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
  }
  .btn-ghost {
    background: #fff;
    color: #6b7280;
    border: 1px solid #e5e7eb;
  }
  .btn-ghost:hover { border-color: #4f46e5; color: #4f46e5; background: #f5f3ff; }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── CAL NAV ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .cal-title {
    font-size: 32px;
    font-weight: 900;
    color: #1a1a2e;
    letter-spacing: -0.5px;
  }
  .cal-title span { color: #4f46e5; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid #e5e7eb;
    color: #374151;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .today-btn { width: auto; padding: 0 14px; font-weight: 600; }

  /* ── CALENDAR ── */
  .cal-wrap {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #e8eaed;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-header {
    padding: 14px 0;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: #9ca3af;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f5;
  }
  .day-header.sun { color: #ef4444; }
  .day-header.sat { color: #6366f1; }

  .day-cell {
    border-right: 1px solid #f0f0f5;
    border-bottom: 1px solid #f0f0f5;
    min-height: 140px;
    padding: 10px;
    cursor: pointer;
    transition: background .12s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f8f7ff; }
  .day-cell.other-month { background: #fafafa; opacity: 0.5; }

  .day-num {
    font-size: 16px;
    font-weight: 700;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .day-cell.today .day-num { background: #4f46e5; color: #fff !important; }
  .day-cell.selected { background: #eef2ff !important; outline: 2px solid #4f46e5 inset; }

  /* Tags */
  .tag {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tag-work { background: #dcfce7; color: #15803d; }
  .tag-off { background: #fee2e2; color: #b91c1c; }
  .tag-half { background: #fef3c7; color: #92400e; }
  .tag-meeting { background: #e0e7ff; color: #3730a3; margin-top: 2px; }

  /* ── MEMO PANEL ── */
  .memo-panel-wrap {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease;
  }
  .memo-panel-wrap.open { max-height: 800px; margin-top: 20px; }

  .memo-panel {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #4f46e5;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1);
  }

  .panel-section { display: flex; flex-direction: column; gap: 10px; }
  .section-title { font-size: 14px; font-weight: 700; color: #6b7280; }

  /* Attendance Options */
  .attendance-grid { display: flex; gap: 10px; }
  .att-option {
    flex: 1;
    padding: 10px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .att-option.active {
    border-color: #4f46e5;
    background: #f5f3ff;
    color: #4f46e5;
    font-weight: 700;
  }

  .name-input {
    width: 100%;
    padding: 10px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 5px;
  }

  .memo-textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    resize: vertical;
  }

  .save-status { font-size: 13px; color: #9ca3af; height: 20px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; padding: 10px 20px;
    border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 1000;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .attendance-grid { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DOWNTOP <span>TEAM</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportData()">📤 백업</button>
  </div>
</header>

<main>
  <div class="cal-nav">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn today-btn" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="memo-panel-wrap" id="memo-panel-wrap">
    <div class="memo-panel">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h2 id="panel-date-text">2026년 05월 14일</h2>
        <button class="nav-btn" onclick="closePanel()">✕</button>
      </div>

      <!-- 1. 근태 관리 -->
      <div class="panel-section">
        <div class="section-title">출근/휴무 상태</div>
        <div class="attendance-grid">
          <div class="att-option" data-val="work" onclick="setAtt('work')">출근</div>
          <div class="att-option" data-val="off" onclick="setAtt('off')">연차</div>
          <div class="att-option" data-val="half" onclick="setAtt('half')">반차</div>
        </div>
        <div id="name-input-box" style="display:none">
          <input type="text" id="att-names" class="name-input" placeholder="대상자 이름을 입력하세요 (예: 홍길동, 김철수)">
        </div>
      </div>

      <!-- 2. 회의 메모 -->
      <div class="panel-section">
        <div class="section-title">회의 및 주요 일정 메모</div>
        <textarea id="meeting-note" class="memo-textarea" placeholder="회의 내용이나 특이사항을 입력하세요..."></textarea>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="save-status" id="save-status"></div>
        <button class="btn btn-primary" style="background:#4f46e5; color:#fff; padding:10px 24px" onclick="saveData()">💾 데이터 저장하기</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// 구조 변경: { date: { type: 'off', names: '홍길동', note: '회의내용' } }
let calendarData = {};
let currentDate = new Date();
let selectedKey = null;

const API_URL = 'https://script.google.com/macros/s/AKfycbwXxHQO6rneZDw_0sCrc_dxrM-dVWXHtKQS1w7lqEr3o13fZLKEzBdiFOOikQJY3_HN/exec';

// 초기 로드
async function init() {
  await loadData();
  render();
}

function render() {
  const y = currentDate.getFullYear();
  const mo = currentDate.getMonth();
  const first = new Date(y, mo, 1);
  const last = new Date(y, mo+1, 0);
  const startDay = first.getDay();
  
  document.getElementById('cal-title').innerHTML = `${y}년 <span>${mo + 1}월</span>`;

  let html = ['일','월','화','수','목','금','토'].map((d,i) => 
    `<div class="day-header ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');

  const addCell = (date, isOther) => {
    const key = dateKey(date);
    const dayData = calendarData[key] || {};
    const isToday = sameDay(date, new Date());
    const isSelected = key === selectedKey;
    
    let tagsHtml = '';
    if(dayData.type === 'work') tagsHtml += `<div class="tag tag-work">출근</div>`;
    if(dayData.type === 'off') tagsHtml += `<div class="tag tag-off">연차: ${dayData.names || ''}</div>`;
    if(dayData.type === 'half') tagsHtml += `<div class="tag tag-half">반차: ${dayData.names || ''}</div>`;
    if(dayData.note) tagsHtml += `<div class="tag tag-meeting">📝 메모있음</div>`;

    html += `
      <div class="day-cell ${isOther?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDay('${key}')">
        <div class="day-num ${date.getDay()===0?'sun':date.getDay()===6?'sat':''}">${date.getDate()}</div>
        ${tagsHtml}
      </div>`;
  };

  for (let i=0; i<startDay; i++) addCell(new Date(y, mo, i-startDay+1), true);
  for (let d=1; d<=last.getDate(); d++) addCell(new Date(y, mo, d), false);
  const totalCells = startDay + last.getDate();
  for (let d=1; d<=(42-totalCells); d++) addCell(new Date(y, mo+1, d), true);

  document.getElementById('cal-grid').innerHTML = html;
}

function selectDay(key) {
  selectedKey = key;
  const data = calendarData[key] || { type: '', names: '', note: '' };
  
  document.getElementById('panel-date-text').textContent = key;
  document.getElementById('meeting-note').value = data.note || '';
  document.getElementById('att-names').value = data.names || '';
  
  // 상태 버튼 UI 업데이트
  document.querySelectorAll('.att-option').forEach(opt => {
    opt.classList.toggle('active', opt.dataset.val === data.type);
  });
  
  toggleNameInput(data.type);
  
  document.getElementById('memo-panel-wrap').classList.add('open');
  render();
  
  setTimeout(() => {
    document.getElementById('memo-panel-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function setAtt(type) {
  const current = document.querySelector('.att-option.active');
  if (current && current.dataset.val === type) {
    // 이미 클릭된거 다시 누르면 해제
    document.querySelectorAll('.att-option').forEach(opt => opt.classList.remove('active'));
    toggleNameInput('');
  } else {
    document.querySelectorAll('.att-option').forEach(opt => {
      opt.classList.toggle('active', opt.dataset.val === type);
    });
    toggleNameInput(type);
  }
}

function toggleNameInput(type) {
  const box = document.getElementById('name-input-box');
  box.style.display = (type === 'off' || type === 'half') ? 'block' : 'none';
}

async function saveData() {
  const activeOpt = document.querySelector('.att-option.active');
  const type = activeOpt ? activeOpt.dataset.val : '';
  const names = document.getElementById('att-names').value;
  const note = document.getElementById('meeting-note').value;

  calendarData[selectedKey] = { type, names, note };
  
  setSaveStatus('💾 저장 중...');
  
  try {
    // 구글 시트로 전송 (JSON 전체를 보낼 수도 있고, 해당 날짜만 보낼 수도 있습니다)
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        date: selectedKey,
        type: type,
        names: names,
        note: note
      })
    });
    
    localStorage.setItem('downtop-data', JSON.stringify(calendarData));
    setSaveStatus('✅ 저장 완료');
    render();
    setTimeout(() => setSaveStatus(''), 2000);
  } catch (e) {
    setSaveStatus('❌ 통신 오류 (로컬저장됨)');
  }
}

async function loadData() {
  // 로컬 우선 로드
  const local = localStorage.getItem('downtop-data');
  if(local) calendarData = JSON.parse(local);
  
  // 구글 시트에서 가져오기
  try {
    const res = await fetch(API_URL);
    const remoteData = await res.json();
    if(remoteData) {
        calendarData = remoteData;
        localStorage.setItem('downtop-data', JSON.stringify(calendarData));
    }
  } catch(e) { console.log("오프라인 모드"); }
}

function closePanel() {
  selectedKey = null;
  document.getElementById('memo-panel-wrap').classList.remove('open');
  render();
}

function changeMonth(dir) {
  closePanel();
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1);
  render();
}

function goToday() {
  closePanel();
  currentDate = new Date();
  render();
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function setSaveStatus(msg) { document.getElementById('save-status').textContent = msg; }

function exportData() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(calendarData));
  const downloadAnchorNode = document.createElement('a');
  downloadAnchorNode.setAttribute("href", dataStr);
  downloadAnchorNode.setAttribute("download", "calendar_backup.json");
  document.body.appendChild(downloadAnchorNode);
  downloadAnchorNode.click();
  downloadAnchorNode.remove();
}

init();
</script>
</body>
</html>
