<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다운탑 팀 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f4f5f7; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; color: #1a1a2e; }
  header { background: #fff; border-bottom: 1px solid #e8eaed; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .logo { font-size: 22px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.3px; }
  .logo span { color: #4f46e5; }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; transition: 0.2s; }
  .btn-ghost { background: #fff; color: #6b7280; border: 1px solid #e5e7eb; }
  .btn-primary { background: #4f46e5; color: #fff; }
  main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cal-title { font-size: 32px; font-weight: 900; color: #1a1a2e; letter-spacing: -0.5px; }
  .cal-title span { color: #4f46e5; }
  .nav-btns { display: flex; gap: 6px; align-items: center; }
  .nav-btn { width: 36px; height: 36px; border-radius: 8px; background: #fff; border: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .today-btn { width: auto; padding: 0 14px; font-weight: 600; }
  .cal-wrap { background: #fff; border-radius: 16px; border: 1px solid #e8eaed; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.06); position: relative; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .day-header { padding: 14px 0; text-align: center; font-size: 15px; font-weight: 700; color: #9ca3af; background: #fafafa; border-bottom: 1px solid #f0f0f5; }
  .day-header.sun { color: #ef4444; }
  .day-header.sat { color: #6366f1; }
  .day-cell { border-right: 1px solid #f0f0f5; border-bottom: 1px solid #f0f0f5; min-height: 140px; padding: 10px; cursor: pointer; transition: background .12s; display: flex; flex-direction: column; gap: 4px; }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #f8f7ff; }
  .day-cell.other-month { background: #fafafa; opacity: 0.5; }
  .day-num { font-size: 16px; font-weight: 700; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; margin-bottom: 2px; }
  .day-num.sun { color: #ef4444 !important; }
  .day-num.sat { color: #6366f1; }
  .day-cell.today .day-num { background: #4f46e5 !important; color: #fff !important; box-shadow: 0 2px 6px rgba(79, 70, 229, 0.4); }
  .day-cell.selected:not(.today) .day-num { outline: 2px solid #4f46e5; outline-offset: 2px; }
  .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 600; display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-holiday { background: #fee2e2; color: #ef4444; }
  .tag-work { background: #f0fdf4; color: #15803d; }
  .tag-off { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
  .tag-half { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
  .tag-meeting { background: #f3f4f6; color: #4b5563; margin-top: 2px; border-left: 3px solid #4f46e5; }
  .memo-panel-wrap { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
  .memo-panel-wrap.open { max-height: 900px; margin-top: 20px; }
  .memo-panel { background: #fff; border-radius: 16px; border: 1px solid #4f46e5; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.1); }
  .panel-section { display: flex; flex-direction: column; gap: 10px; }
  .section-title { font-size: 14px; font-weight: 700; color: #6b7280; }

  /* 출석 블록 — 3개 독립 카드 */
  .att-blocks { display: flex; flex-direction: column; gap: 12px; }
  .att-block { border: 1.5px solid #e5e7eb; border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
  .att-block.active { border-color: #4f46e5; }
  .att-block-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; user-select: none; background: #fafafa; transition: background 0.15s; }
  .att-block.active .att-block-header { background: #f5f3ff; }
  .att-block-header input[type=checkbox] { width: 17px; height: 17px; accent-color: #4f46e5; cursor: pointer; }
  .att-block-label { font-size: 15px; font-weight: 600; color: #374151; }
  .att-block.active .att-block-label { color: #4f46e5; }
  .att-block-body { display: none; padding: 10px 14px 12px; border-top: 1px solid #e5e7eb; }
  .att-block.active .att-block-body { display: block; }
  .att-block-body input { width: 100%; padding: 8px 10px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; }

  .memo-textarea { width: 100%; min-height: 100px; padding: 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; resize: vertical; font-family: 'Noto Sans KR', sans-serif; }
  .save-status { font-size: 13px; color: #9ca3af; height: 20px; }
  .loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.7); display:flex; justify-content:center; align-items:center; z-index:10; font-weight:bold; color:#4f46e5; }
</style>
</head>
<body>

<header>
  <div class="logo">DOWNTOP <span>TEAM</span></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="fetchData()">🔄 새로고침</button>
  </div>
</header>

<main>
  <div class="cal-nav">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <button class="nav-btn today-btn" onclick="goToday()">오늘</button>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>

  <div class="cal-wrap">
    <div id="loading" class="loading-overlay">데이터를 불러오는 중...</div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="memo-panel-wrap" id="memo-panel-wrap">
    <div class="memo-panel">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <h2 id="panel-date-text">날짜</h2>
        <button class="nav-btn" onclick="closePanel()">✕</button>
      </div>

      <div class="panel-section">
        <div class="section-title">출근 / 휴무 상태 (중복 선택 가능)</div>
        <div class="att-blocks">

          <!-- 출근 -->
          <div class="att-block" id="block-work">
            <div class="att-block-header" onclick="toggleBlock('work')">
              <input type="checkbox" id="chk-work" onclick="event.stopPropagation(); toggleBlock('work')">
              <span class="att-block-label">출근</span>
            </div>
            <div class="att-block-body">
              <input type="text" id="names-work" placeholder="출근자 이름 (선택)">
            </div>
          </div>

          <!-- 연차 -->
          <div class="att-block" id="block-off">
            <div class="att-block-header" onclick="toggleBlock('off')">
              <input type="checkbox" id="chk-off" onclick="event.stopPropagation(); toggleBlock('off')">
              <span class="att-block-label">연차</span>
            </div>
            <div class="att-block-body">
              <input type="text" id="names-off" placeholder="연차자 이름">
            </div>
          </div>

          <!-- 반차 -->
          <div class="att-block" id="block-half">
            <div class="att-block-header" onclick="toggleBlock('half')">
              <input type="checkbox" id="chk-half" onclick="event.stopPropagation(); toggleBlock('half')">
              <span class="att-block-label">반차</span>
            </div>
            <div class="att-block-body">
              <input type="text" id="names-half" placeholder="반차자 이름">
            </div>
          </div>

        </div>
      </div>

      <div class="panel-section">
        <div class="section-title">회의 및 주요 일정 메모</div>
        <textarea id="meeting-note" class="memo-textarea" placeholder="회의 내용 입력..."></textarea>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center">
        <div class="save-status" id="save-status"></div>
        <button class="btn btn-primary" onclick="saveData()">💾 데이터 저장하기</button>
      </div>
    </div>
  </div>
</main>

<script>
let calendarData = {};
let currentDate = new Date();
let selectedKey = null;

const API_URL = 'https://script.google.com/macros/s/AKfycbyUZ3dUWh7rk93vckJkw20wVQLMr0mzph7oKh_Qjvj5SuvPo08yOrWdA3dbhAp7B9o/exec';

function getHolidays(year) {
  const h = {
    [`${year}-01-01`]:'신정', [`${year}-03-01`]:'삼일절',
    [`${year}-05-05`]:'어린이날', [`${year}-06-06`]:'현충일',
    [`${year}-08-15`]:'광복절', [`${year}-10-03`]:'개천절',
    [`${year}-10-09`]:'한글날', [`${year}-12-25`]:'크리스마스'
  };
  const seollal = { 2026:[['2026-02-16','설날'],['2026-02-17','설날'],['2026-02-18','설날'],['2026-02-19','대체공휴일']] };
  const chuseok = { 2026:[['2026-09-24','추석'],['2026-09-25','추석'],['2026-09-26','추석'],['2026-09-27','대체공휴일']] };
  const extra   = { 2026:{'2026-05-24':'부처님오신날'} };
  if (seollal[year]) seollal[year].forEach(([d,n]) => h[d]=n);
  if (chuseok[year]) chuseok[year].forEach(([d,n]) => h[d]=n);
  if (extra[year])   Object.assign(h, extra[year]);
  return h;
}

// 체크박스 토글
function toggleBlock(type) {
  const chk   = document.getElementById('chk-' + type);
  const block = document.getElementById('block-' + type);
  chk.checked = !chk.checked;
  block.classList.toggle('active', chk.checked);
}

// 패널에 데이터 채우기
function fillPanel(data) {
  const types = ['work', 'off', 'half'];
  types.forEach(t => {
    const chk   = document.getElementById('chk-' + t);
    const block = document.getElementById('block-' + t);
    const input = document.getElementById('names-' + t);
    const on    = data && data[t] !== undefined && data[t] !== false;
    chk.checked = on;
    block.classList.toggle('active', on);
    input.value = (data && data[t]) ? data[t] : '';
  });
  document.getElementById('meeting-note').value = (data && data.note) ? data.note : '';
}

// 패널에서 데이터 읽기
function readPanel() {
  const obj = { note: document.getElementById('meeting-note').value };
  ['work', 'off', 'half'].forEach(t => {
    const chk = document.getElementById('chk-' + t);
    obj[t] = chk.checked ? (document.getElementById('names-' + t).value || true) : false;
  });
  return obj;
}

// ── GET: JSONP 데이터 로드 ──────────────────
function fetchData() {
  const loading = document.getElementById('loading');
  if (loading) loading.style.display = 'flex';

  const old = document.getElementById('jsonp-script');
  if (old) old.remove();

  const timer = setTimeout(() => {
    if (!window.__calendarCallback) return;
    delete window.__calendarCallback;
    const local = localStorage.getItem('downtop-data');
    if (local) { calendarData = JSON.parse(local); render(); }
    if (loading) loading.style.display = 'none';
  }, 8000);

  window.__calendarCallback = function(data) {
    clearTimeout(timer);
    delete window.__calendarCallback;
    const s = document.getElementById('jsonp-script');
    if (s) s.remove();
    calendarData = data || {};
    localStorage.setItem('downtop-data', JSON.stringify(calendarData));
    if (loading) loading.style.display = 'none';
    render();
  };

  const script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = `${API_URL}?callback=__calendarCallback&t=${Date.now()}`;
  script.onerror = () => {
    clearTimeout(timer);
    delete window.__calendarCallback;
    const local = localStorage.getItem('downtop-data');
    if (local) { calendarData = JSON.parse(local); render(); }
    if (loading) loading.style.display = 'none';
  };
  document.head.appendChild(script);
}

// ── SAVE: JSONP GET으로 저장 ─────────────────
function saveData() {
  if (!selectedKey) return;
  const d = readPanel();

  // 즉시 로컬 반영
  calendarData[selectedKey] = d;
  localStorage.setItem('downtop-data', JSON.stringify(calendarData));
  render();
  setSaveStatus('💾 저장 중...');

  const old = document.getElementById('jsonp-save-script');
  if (old) old.remove();

  const cbName = '__saveCallback';
  // 각 필드를 문자열로 직렬화해서 전송
  const params = new URLSearchParams({
    callback: cbName,
    action:   'save',
    date:     selectedKey,
    work:     d.work  === false ? '' : (d.work  === true ? '__checked__' : d.work),
    off:      d.off   === false ? '' : (d.off   === true ? '__checked__' : d.off),
    half:     d.half  === false ? '' : (d.half  === true ? '__checked__' : d.half),
    note:     d.note || '',
    t:        Date.now()
  });

  const timer = setTimeout(() => {
    delete window[cbName];
    const s = document.getElementById('jsonp-save-script');
    if (s) s.remove();
    setSaveStatus('✅ 저장 완료');
    setTimeout(() => setSaveStatus(''), 2000);
  }, 8000);

  window[cbName] = function(res) {
    clearTimeout(timer);
    delete window[cbName];
    const s = document.getElementById('jsonp-save-script');
    if (s) s.remove();
    setSaveStatus(res && res.ok ? '✅ 저장 완료' : '⚠️ 저장 확인 필요');
    setTimeout(() => setSaveStatus(''), 2000);
  };

  const script = document.createElement('script');
  script.id = 'jsonp-save-script';
  script.src = `${API_URL}?${params.toString()}`;
  script.onerror = () => {
    clearTimeout(timer);
    delete window[cbName];
    setSaveStatus('✅ 저장 완료 (로컬)');
    setTimeout(() => setSaveStatus(''), 2000);
  };
  document.head.appendChild(script);
}

function render() {
  const y  = currentDate.getFullYear();
  const mo = currentDate.getMonth();
  const holidays = getHolidays(y);
  document.getElementById('cal-title').innerHTML = `${y}년 <span>${mo + 1}월</span>`;

  let html = ['일','월','화','수','목','금','토'].map((d,i) =>
    `<div class="day-header ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const first    = new Date(y, mo, 1);
  const last     = new Date(y, mo+1, 0);
  const startDay = first.getDay();

  const addCell = (date, isOther) => {
    const key         = dateKey(date);
    const dayData     = calendarData[key] || {};
    const holidayName = holidays[key];
    const isSun       = date.getDay() === 0 || !!holidayName;
    const isSat       = date.getDay() === 6;
    const isSelected  = key === selectedKey;
    const isToday     = sameDay(date, new Date());

    let tagsHtml = '';
    if (holidayName) tagsHtml += `<div class="tag tag-holiday">${holidayName}</div>`;

    // 출근
    if (dayData.work && dayData.work !== false) {
      const label = dayData.work === true || dayData.work === '__checked__' ? '출근' : `출근: ${dayData.work}`;
      tagsHtml += `<div class="tag tag-work">${label}</div>`;
    }
    // 연차
    if (dayData.off && dayData.off !== false) {
      const label = dayData.off === true || dayData.off === '__checked__' ? '연차' : `연차: ${dayData.off}`;
      tagsHtml += `<div class="tag tag-off">${label}</div>`;
    }
    // 반차
    if (dayData.half && dayData.half !== false) {
      const label = dayData.half === true || dayData.half === '__checked__' ? '반차' : `반차: ${dayData.half}`;
      tagsHtml += `<div class="tag tag-half">${label}</div>`;
    }
    if (dayData.note) tagsHtml += `<div class="tag tag-meeting">📝 메모</div>`;

    html += `<div class="day-cell ${isOther?'other-month':''} ${isToday?'today':''} ${isSelected?'selected':''}" onclick="selectDay('${key}')">
      <div class="day-num ${isSun?'sun':isSat?'sat':''}">${date.getDate()}</div>
      ${tagsHtml}
    </div>`;
  };

  for (let i=0; i<startDay; i++)                        addCell(new Date(y, mo, i-startDay+1), true);
  for (let d=1; d<=last.getDate(); d++)                  addCell(new Date(y, mo, d), false);
  for (let d=1; d<=(42-(startDay+last.getDate())); d++)  addCell(new Date(y, mo+1, d), true);
  document.getElementById('cal-grid').innerHTML = html;
}

function selectDay(key) {
  selectedKey = key;
  document.getElementById('panel-date-text').textContent = key;
  fillPanel(calendarData[key] || {});
  document.getElementById('memo-panel-wrap').classList.add('open');
  render();
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function changeMonth(dir) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth()+dir, 1);
  render();
}
function goToday()         { currentDate = new Date(); render(); }
function setSaveStatus(msg){ document.getElementById('save-status').textContent = msg; }
function closePanel()      {
  document.getElementById('memo-panel-wrap').classList.remove('open');
  selectedKey = null;
  render();
}

fetchData();
</script>
</body>
</html>
